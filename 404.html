  (function () {
    const body = document.body;
    const scroll = document.querySelector(".o-scroll");
    function runLoaderIn() {
      body.classList.remove("is-out", "is-d");
      scroll.classList.remove("revealed");
      setTimeout(() => {
        body.classList.add("is-d");
        scroll.addEventListener(
          "animationend",
          () => scroll.classList.add("revealed"),
          { once: true },
        );
      }, 10);
    }
    document.addEventListener("DOMContentLoaded", runLoaderIn);
    // Back/forward cache
    window.addEventListener("pageshow", (event) => {
      if (event.persisted) runLoaderIn();
    });
    document.addEventListener("click", function (e) {
      const link = e.target.closest("a");
      if (!link) return;
      const href = link.getAttribute("href");
      if (!href) return;
      const isAnchor = href.startsWith("#");
      if (isAnchor) return;
      const isVmdevsSite = href.includes("vmdevs.xyz");
      const isRelativeLink = !href.startsWith("http");
      const shouldAnimate = isVmdevsSite || isRelativeLink;
      if (!shouldAnimate) {
        return;
      }
      e.preventDefault();
      scroll.classList.remove("revealed");
      body.classList.add("is-out");
      scroll.addEventListener(
        "animationend",
        () => {
          if (link.hasAttribute("target")) {
            window.open(href, link.getAttribute("target"));
            runLoaderIn();
          } else {
            window.location.href = href;
          }
        },
        { once: true },
      );
    });
  })();

      navbarMenu.classList.add("is-open");
      disableScroll();
      isMenuOpen = true;
    }
    function closeMenu() {
      line1.classList.remove("is-open");
      line2.classList.remove("is-open");
      navbarMenu.classList.remove("is-open");
      servicesBlock?.classList.remove("is-open");
      industriesBlock?.classList.remove("is-open");
      enableScroll();
      document.querySelectorAll(".arrow-nav-dropdown.is-open").forEach((el) => {
        el.classList.remove("is-open");
      });
      isMenuOpen = false;
    }
    function toggleMenu() {
      isMenuOpen ? closeMenu() : openMenu();
    }
    // Mobile/Dekstop Subnav Logic
    function isMobileDevice() {
      return window.innerWidth < 991;
    }
    function setupInteraction(navSelector, blockSelector) {
      const navEl = document.querySelector(navSelector);
      const blockEl = document.querySelector(blockSelector);
      const arrow = navEl?.querySelector(".arrow-nav-dropdown");
      const closeBtn = blockEl?.querySelector(".link-back-second-nav-list");
      let hideTimeout;
      if (!navEl || !blockEl) return;
      if (isMobileDevice()) {
        // Mobile: toggle on click
        navEl.addEventListener("click", function (e) {
          e.preventDefault();
          blockEl.classList.add("is-open");
          arrow?.classList.add("is-open");
        });
        navLinks.forEach((link) => {
          link.addEventListener("click", () => {
            closeMenu();
          });
        });
        closeBtn?.addEventListener("click", function () {
          blockEl.classList.remove("is-open");
          arrow?.classList.remove("is-open");
        });
      } else {
        // Desktop: hover logic
        navEl.addEventListener("mouseenter", () => {
          blockEl.classList.add("is-open");
          arrow?.classList.add("is-open");
        });
        blockEl.addEventListener("mouseenter", () => {
          blockEl.classList.add("is-open");
          arrow?.classList.add("is-open");
        });
        function handleMouseLeave() {
          hideTimeout = setTimeout(() => {
            if (!navEl.matches(":hover") && !blockEl.matches(":hover")) {
              blockEl.classList.remove("is-open");
              arrow?.classList.remove("is-open");
            }
          }, 100);
        }
        navEl.addEventListener("mouseleave", handleMouseLeave);
        blockEl.addEventListener("mouseleave", handleMouseLeave);
      }
    }
    // Event Bindings
    menuToggleButton.addEventListener("click", toggleMenu);
    navItemsDropdown.forEach(({ nav, block }) => setupInteraction(nav, block));
    // Animation Menu Items After Open
    const animateMenuOpen = () => {
      gsap.set([...menuItems, ...menuButtons], { opacity: 0, y: "10vw" });
      gsap.to(menuItems, {
        opacity: 1,
        y: 0,
        duration: 0.35,
        stagger: 0.1,
        ease: "power2.out",
      });
      gsap.to(menuButtons, {
        opacity: 1,
        y: 0,
        duration: 0.35,
        ease: "power2.out",
        delay: menuItems.length * 0.1,
      });
    };
    const resetMenuAnimation = () => {
      gsap.to([...menuItems, ...menuButtons], {
        opacity: 0,
        y: "10vw",
        duration: 0.3,
        ease: "power1.in",
      });
    };
    const observer = new MutationObserver((mutations) => {
      for (let mutation of mutations) {
        if (mutation.attributeName === "class") {
          const isOpen = navbarMenu.classList.contains("is-open");
          if (isOpen) {
            animateMenuOpen();
          } else {
            resetMenuAnimation();
          }
        }
      }
    });
    observer.observe(navbarMenu, { attributes: true });
    //Split text elements
    document.querySelectorAll("[data-split-text]").forEach(function (_el) {
      let elTypes = _el.dataset.types || "lines, words, chars";
      let elTagName = _el.dataset.tag || "span";
      new SplitType(_el, {
        types: elTypes,
        tagName: elTagName,
      });
    });
    //Text reveal animation
    function startTextAnimations() {
      document
        .querySelectorAll("[data-text-reveal]")
        .forEach(function (_el, i) {
          let el = _el;
          let triggerEl =
            el.dataset.trigger && screenWidth > 1024
              ? document.querySelector(el.dataset.trigger)
              : el;
          let triggerStart = el.dataset.triggerStart || "top 90%";
          let anDelay = el.dataset.delay || 0;
          let anDurationTo = 0.5;
          let anDurationFrom = 0.3;
          if (el.hasAttribute("data-is-first-screen")) {
            anDelay =
              (loaderDuration + loaderBGDuration) * loaderSpeedCoef +
              loaderAddsDelay;
          }
          if (
            el.getAttribute("data-is-first-screen") === "desktop" &&
            screenWidth < 992
          ) {
            anDelay = 0;
          }
          if (
            el.getAttribute("data-is-first-screen") === "tablet" &&
            screenWidth < 768
          ) {
            anDelay = 0;
          }
          if (screenWidth < 1025) {
            triggerStart =
              el.getAttribute("data-trigger-start-on-small") || "top 90%";
          }
          if (screenWidth < 768) {
            triggerStart =
              el.getAttribute("data-trigger-start-on-extra-small") || "top 90%";
          }
          if (isIOS) {
            triggerStart = el.getAttribute("data-trigger-ios") || "top 90%";
          }
          gsap
            .timeline({
              scrollTrigger: {
                trigger: triggerEl,
                start: triggerStart,
              },
            })
            .from(el.querySelectorAll(".word"), {
              yPercent: 100,
              opacity: 0,
              duration: anDurationFrom,
              delay: anDelay,
              stagger: {
                each: 0.03,
                from: "start",
              },
              onComplete: function () {
                SplitType.revert(el);
              },
            })
            .to(
              el,
              {
                opacity: 1,
                duration: anDurationTo,
                ease: "power1.out",
              },
              "<",
            );
        });
    }
    startTextAnimations();
    //Prevent body scrolling on mobile
    mm.add("(max-width: 991px)", () => {
      const body = document.body;
      const isIOS = body.classList.contains("is-ios");
      let scrollPosition = 0;
      function toggleScroll() {
        const isLocked = body.classList.toggle("overflow-hidden");
        if (isIOS) {
          if (isLocked) {
            scrollPosition = window.pageYOffset;
            body.style.position = "fixed";
            body.style.top = `-${scrollPosition}px`;
            body.style.width = "100%";
          } else {
            body.removeAttribute("style");
            window.scrollTo(0, scrollPosition);
          }
        }
      }
      const buttonsDataDisablePageScrolling = document.querySelectorAll(
        "[data-disable-page-scrolling]",
      );
      buttonsDataDisablePageScrolling.forEach((button) =>
        button.addEventListener("click", toggleScroll),
      );
      return () => {
        buttonsDataDisablePageScrolling.forEach((button) =>
          button.removeEventListener("click", toggleScroll),
        );
      };
    });
    //Images mask animation
    document.querySelectorAll("[data-images-mask]").forEach(function (_el) {
      let el = _el;
      let triggerStart = el.dataset.triggerStart || "top 100%";
      let anDelay = el.dataset.trigger ? el.dataset.delay : 0;
      let triggerEl = el.dataset.trigger
        ? document.querySelector(el.dataset.trigger)
        : el;
      gsap.set(el, { "--_animation---images-mask": "0%" });
      if (el.dataset.isFirstScreen !== "false") {
        anDelay = (loaderDuration + loaderBGDuration) * loaderSpeedCoef;
      }
      if (el.dataset.isFirstScreen === "desktop" && screenWidth < 992) {
        anDelay = 0;
      }
      if (el.dataset.isFirstScreen === "tablet" && screenWidth < 768) {
        anDelay = 0;
      }
      if (screenWidth < 992) {
        triggerStart = el.dataset.triggerStartOnSmall || "top 100%";
      } else if (screenWidth < 480) {
        triggerStart = el.dataset.triggerStartOnExtraSmall || "top 100%";
      }
      let timeline = gsap.timeline({
        scrollTrigger: {
          trigger: triggerEl,
          start: triggerStart,
        },
      });
      timeline.to(el, {
        "--_animation---images-mask": "100%",
        duration: 1.5,
        delay: anDelay,
      });
    });
    //Opacity in animation
    document.querySelectorAll("[data-fade-in]").forEach(function (el) {
      let triggerStart = el.dataset.triggerStart || "top 100%";
      let anDelay = el.dataset.delay || 0;
      if (el.dataset.isFirstScreen) {
        anDelay = (loaderDuration + loaderBGDuration) * loaderSpeedCoef;
      }
      const timeline = gsap.timeline({
        scrollTrigger: {
          trigger: el,
          start: triggerStart,
        },
      });
      timeline.from(el, {
        opacity: 0,
        duration: 0.5,
        delay: anDelay,
      });
    });
    document.querySelectorAll("[data-opacity]").forEach(function (_el) {
      let el = _el;
      let triggerStart = el.dataset.triggerStart || "top 100%";
      let anDelay = el.dataset.delay || 0;
      anDelay = (loaderDuration + loaderBGDuration) * loaderSpeedCoef;
      let timeline = gsap.timeline({
        scrollTrigger: {
          trigger: el,
          start: triggerStart,
        },
      });
      timeline.to(el, {
        opacity: 1,
        duration: 1.5,
        delay: anDelay,
      });
    });
    //Refresh ScrollTrigger on resize
    let resizeTimeout;
    const resizeObserver = new ResizeObserver(() => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        requestAnimationFrame(() => {
          ScrollTrigger.refresh();
        });
      }, 50);
    });
    resizeObserver.observe(document.body);
    //Lines animation
    if (!isIOS) {
      mm.add("(min-width: 768px)", () => {
        document.querySelectorAll("[data-lines-bg]").forEach(function (_el) {
          let el = _el;
          let triggerStart = el.dataset.triggerStart || "top bottom";
          let triggerEnd = el.dataset.triggerEnd || "bottom top";
          let screenWidth = window.innerWidth;
          let heightStartValue = screenWidth > 991 ? "11.2vw" : "7.8125rem";
          let heightEndValue = screenWidth > 991 ? "0vw" : "0rem";
          gsap.set(el, { height: heightStartValue });
          gsap.to(el, {
            scrollTrigger: {
              trigger: el,
              start: `clamp(${triggerStart})`,
              end: `clamp(${triggerEnd})`,
              scrub: true,
            },
            height: heightEndValue,
          });
        });
      });
    }
    //Sliding section animation
    if (!isIOS) {
      mm.add("(min-width: 1025px)", () => {
        document
          .querySelectorAll('[data-slide-over="true"]')
          .forEach(function (_el) {
            let el = _el;
            let triggerStart = el.dataset.triggerStart || "top bottom";
            let triggerEnd = el.dataset.triggerEnd || "bottom top";
            let triggerScrub = el.dataset.scrub || 1.5;
            let slideMarginTop = el.dataset.marginTop || "-50vh";
            gsap.to(el, {
              scrollTrigger: {
                trigger: el,
                start: `clamp(${triggerStart})`,
                end: `clamp(${triggerEnd})`,
                scrub: triggerScrub,
              },
              marginTop: slideMarginTop,
            });
          });
        document
          .querySelectorAll('[data-slide-from-under="true"]')
          .forEach(function (_el) {
            let el = _el;
            let triggerStart = el.dataset.triggerStart || "top bottom-=50%";
            let triggerEnd = el.dataset.triggerEnd || "bottom top";
            let defaultValue = el.dataset.defaultValue || "-80";
            gsap.set(el, { yPercent: defaultValue });
            gsap.to(el, {
              scrollTrigger: {
                trigger: el,
                start: `clamp(${triggerStart})`,
                end: `clamp(${triggerEnd})`,
                scrub: 1.5,
              },
              yPercent: 0,
            });
          });
      });
    }
    //Awards list animation
    const awardsContainerThree = document.getElementById(
      "section_awards_three",
    );
    if (awardsContainerThree) {
      mm.add("(min-width: 992px)", () => {
        const awardsList = awardsContainerThree.querySelector(".awards_list");
        const preloadImages = () => {
          return new Promise((resolve) => {
            imagesLoaded(awardsContainerThree.querySelectorAll("img"), resolve);
          });
        };
        preloadImages().then(() => {
          new GeometryWaveEffect(awardsContainerThree, awardsList, {
            strength: 0.25,
          });
        });
      });
    }
    mm.add("(max-width: 991px)", () => {
      document.querySelectorAll("[data-load-more]").forEach((button) => {
        button.addEventListener("click", () => {
          const name = button.getAttribute("data-load-more");
          const container = document.querySelector(
            `[data-load-content='${name}']`,
          );
          if (!container) return;
          const items = container.querySelectorAll("[data-load-item]");
          items.forEach((item) => gsap.set(item, { display: "block" }));
          gsap.to(items, {
            opacity: 1,
            duration: 0.3,
          });
          gsap.to(button, {
            opacity: 0,
            duration: 0.3,
            onComplete: () => {
              gsap.set(button, { display: "none" });
            },
          });
        });
      });
    });
    (() => {
      const awardsContainer = document.getElementById("section_awards");
      if (!awardsContainer) return;
      const awardList = awardsContainer.querySelector(".awards_list");
      let activeLink = null;
      let activeCover = null;
      let lastX = 0,
        lastY = 0;
      let scrollTicking = false;
      const applyPos = () => {
        if (!activeCover) return;
        activeCover.style.transform = `translate(-50%, -50%) translate3d(${lastX}px, ${lastY}px, 0)`;
      };
      const getCover = (linkEl) =>
        linkEl?.querySelector(".awards_item_cover") || null;
      const activateFor = (linkEl) => {
        if (!linkEl) return deactivate();
        if (activeLink === linkEl && activeCover) {
          applyPos();
          return;
        }
        deactivate();
        activeLink = linkEl;
        activeCover = getCover(activeLink);
        if (!activeCover) {
          activeLink = null;
          return;
        }
        document.body.appendChild(activeCover);
        activeCover.classList.add("is-active");
        applyPos();
      };
      const deactivate = () => {
        if (!activeLink || !activeCover) {
          activeLink = null;
          activeCover = null;
          return;
        }
        activeCover.classList.remove("is-active");
        const content =
          activeLink.querySelector(".awards_item-content") || activeLink;
        content.insertBefore(activeCover, content.firstChild);
        activeLink = null;
        activeCover = null;
      };
      window.addEventListener(
        "pointermove",
        (e) => {
          lastX = e.clientX;
          lastY = e.clientY;
          const el = document.elementFromPoint(lastX, lastY);
          const link = el?.closest(".awards_item .link.w-inline-block");
          if (link) activateFor(link);
          else deactivate();
        },
        { passive: true },
      );
      awardList.addEventListener(
        "pointerenter",
        (e) => {
          const link = e.target.closest(".awards_item .link.w-inline-block");
          if (!link) return;
          lastX = e.clientX;
          lastY = e.clientY;
          activateFor(link);
        },
        true,
      );
      awardList.addEventListener(
        "pointerleave",
        (e) => {
          const toEl = e.relatedTarget;
          if (!toEl || !awardList.contains(toEl)) deactivate();
        },
        true,
      );
      const onScrollFrame = () => {
        scrollTicking = false;
        if (lastX == null || lastY == null) return;
        const el = document.elementFromPoint(lastX, lastY);
        const link = el?.closest(".awards_item .link.w-inline-block");
        if (link) {
          activateFor(link);
          applyPos();
        } else {
          deactivate();
        }
      };
      const requestOnScrollFrame = () => {
        if (!scrollTicking) {
          scrollTicking = true;
          requestAnimationFrame(onScrollFrame);
        }
      };
      window.addEventListener("scroll", requestOnScrollFrame, {
        passive: true,
      });
      window.addEventListener("wheel", requestOnScrollFrame, { passive: true });
      window.addEventListener("resize", requestOnScrollFrame);
    })();
    //Footer BG animation
    const isMobileAgent =
      /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(
        navigator.userAgent,
      );
    const elements = document.querySelectorAll("[bg-animation-gradient]");
    const colors = [
      "#3548FE",
      "#353F9E",
      "#4855DB",
      "#151A36",
      "#343E9A",
      "#2D38B7",
      "#434ECB",
    ];
    const numPerColor = 2;
    const initialDuration = isMobileAgent ? 3 : 7; // seconds
    const durationVariation = isMobileAgent ? 4 : 6; // seconds
    const baseSize = isMobileAgent ? 30 : 20; // vw
    const sizeVariation = isMobileAgent ? 15 : 10; //vw
    elements.forEach((container) => {
      colors.forEach((color) => {
        for (let i = 0; i < numPerColor; i++) {
          const circle = document.createElement("div");
          circle.classList.add("circle");
          circle.style.background = color;
          const size =
            Math.round((baseSize + Math.random() * sizeVariation) * 100) / 100;
          circle.style.width = size + "vw";
          circle.style.height = size + "vw";
          circle.style.left = Math.round(Math.random() * 100) + "%";
          circle.style.top = Math.round(Math.random() * 100) + "%";
          const duration = Math.round(
            initialDuration + Math.random() * durationVariation,
          );
          circle.style.animationDuration = duration + "s";
          const delay = Math.round(-(Math.random() * duration));
          circle.style.animationDelay = delay + "s";
          container.appendChild(circle);
        }
      });
    });
    //Sliders
    mm.add("(max-width: 480px)", () => {
      const splides = [];
      const techSlider = document.querySelector("#technology-slider");
      if (techSlider) {
        const techSplide = new Splide(techSlider, {
          type: "slide",
          pagination: true,
          focus: "left",
          classes: {
            pagination: "splide__pagination technology_pagination",
            page: "splide__pagination__page",
          },
          arrows: false,
          destroy: true,
          breakpoints: {
            478: {
              destroy: false,
              perPage: 1,
              drag: true,
            },
          },
        }).mount();
        splides.push(techSplide);
      }
      const digitSlider = document.querySelector("#digit-slider");
      if (digitSlider) {
        const digitSplide = new Splide(digitSlider, {
          type: "slide",
          pagination: true,
          focus: "left",
          classes: {
            pagination: "splide__pagination technology_pagination",
            page: "splide__pagination__page-digit-list-numbers",
          },
          arrows: false,
          destroy: true,
          breakpoints: {
            478: {
              destroy: false,
              perPage: 1,
              drag: true,
            },
          },
        }).mount();
        splides.push(digitSplide);
      }
      return () => {
        splides.forEach((splide) => splide.destroy());
      };
    });
    //GLightbox
    const videoReviewLightbox = GLightbox({
      selector: "[data-video-review-lightbox]",
      touchNavigation: false,
      plyr: {
        config: {
          ratio: null,
        },
      },
    });
    const gLightboxes = GLightbox({
      selector: "[data-glightbox]",
      touchNavigation: false,
      plyr: {
        config: {
          ratio: null,
        },
      },
    });
    //Rating Stars
    const ratingElements = document.querySelectorAll(
      "[data-rating-stars-value]",
    );
    ratingElements.forEach((el) => {
      let value = parseFloat(el.getAttribute("data-rating-stars-value"));
      if (isNaN(value)) {
        value = 5;
      }
      el.style.width = `${((value / 5) * 100).toFixed(2)}%`;
    });
    //Toggle footer cards height
    mm.add("(pointer: fine)", () => {
      function toggleHeight(element, add) {
        if (add) {
          element.style.height = element.scrollHeight + "px";
        } else {
          element.style.height = "0";
        }
      }
      const cards = document.querySelectorAll(".card_component");
      cards.forEach((card) => {
        const footer = card.querySelector(".card_footer");
        if (!footer) return;
        const onEnter = () => {
          toggleHeight(footer, true);
          footer.classList.add("open");
        };
        const onLeave = () => {
          toggleHeight(footer, false);
          footer.classList.remove("open");
        };
        card.addEventListener("mouseenter", onEnter);
        card.addEventListener("mouseleave", onLeave);
        return () => {
          card.removeEventListener("mouseenter", onEnter);
          card.removeEventListener("mouseleave", onLeave);
        };
      });
    });
    //Featured Services hover
    const featuredServices = document.querySelectorAll(
      ".featured-service_block",
    );
    featuredServices.forEach((service) => {
      service.addEventListener("mouseenter", () => {
        featuredServices.forEach((s) => s.classList.remove("is-active"));
        service.classList.add("is-active");
      });
      service.addEventListener("mouseleave", () => {
        service.classList.remove("is-active");
      });
    });
    //Arrow hover animation
    const arrowWrappers = document.querySelectorAll("[data-arrow-wrap]");
    arrowWrappers.forEach((wrapper) => {
      const arrowIcon = wrapper.querySelector(".data-arrow-icon");
      const arrowTl = gsap.timeline({
        defaults: {
          duration: 0.2,
        },
        paused: true,
      });
      arrowTl
        .set(arrowIcon, {
          transformOrigin: "left bottom",
        })
        .to(arrowIcon, {
          scale: 0,
          xPercent: 100,
          yPercent: -100,
        })
        .set(arrowIcon, {
          transformOrigin: "right top",
          xPercent: -100,
          yPercent: 100,
        })
        .to(arrowIcon, {
          scale: 1,
          xPercent: 0,
          yPercent: 0,
        });
      wrapper.addEventListener("mouseenter", () => {
        arrowTl.restart();
      });
    });
  });
</script>
  <script type="module">
  import Lenis from "https://cdn.jsdelivr.net/npm/lenis@1.3.17/dist/lenis.mjs";
  const lenis = new Lenis();
  lenis.on("scroll", () => ScrollTrigger.update());
  gsap.ticker.add((time) => lenis.raf(time * 1000));
  gsap.ticker.lagSmoothing(0);
</script>
</body>
